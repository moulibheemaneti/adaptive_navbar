name: adaptive_navbar

description: A responsive Flutter navigation bar that adapts to screen size, rendering as a full navbar on web and desktop and collapsing into a menu drawer on mobile.

version: 1.1.3

# author: Mouli Bheemaneti <moulibheemaneti99@gmail.com>

homepage: https://github.com/moulibheemaneti/adaptive_navbar.git

repository: https://github.com/moulibheemaneti/adaptive_navbar.git

issue_tracker: https://github.com/moulibheemaneti/adaptive_navbar/issues

topics:
  - navigation
  - navbar
  - responsive
  - adaptive
  - widget

screenshots:
  - description: "Adaptive navbar shown on web (full navbar) and mobile (menu icon) layouts."
    path: screenshots/adaptive_navbar.png

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  dart_husky: ^1.2.2

flutter:
  uses-material-design: true
