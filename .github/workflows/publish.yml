name: Publish to pub.dev

on:
  push:
    tags:
      - "adaptive_navbar-v[0-9]+.[0-9]+.[0-9]+"

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Dry run
        run: flutter pub publish --dry-run

      - name: Publish
        run: flutter pub publish --force
